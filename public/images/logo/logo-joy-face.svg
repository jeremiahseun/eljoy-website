<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="joyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" /> <!-- Violet -->
      <stop offset="100%" stop-color="#EC4899" /> <!-- Pink/Magenta -->
    </linearGradient>
  </defs>

  <!-- Abstract Mesh Background (Code Fragments) -->
  <g opacity="0.4" stroke="url(#joyGradient)" stroke-width="1.5" stroke-linecap="round">
    <path d="M40 60 L 60 60 M 30 80 L 50 80 M 45 140 L 65 140" />
    <path d="M140 60 L 160 60 M 150 80 L 170 80" />
    <path d="M100 30 V 50 M 100 150 V 170" />
    <circle cx="100" cy="100" r="85" stroke-dasharray="10 20" />
  </g>

  <!-- Joy Face Features (Syntax Characters) -->
  <g stroke="url(#joyGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Eyes: Brackets {} -->
    <path d="M65 80 C 60 80, 55 85, 55 95 C 55 105, 60 110, 65 110" /> <!-- { -->
    <path d="M135 80 C 140 80, 145 85, 145 95 C 145 105, 140 110, 135 110" /> <!-- } -->

    <!-- Smile: Curved path of syntax markers -->
    <path d="M60 135 Q 100 170 140 135" stroke-width="8" />
    <!-- Semicolon dot -->
    <circle cx="100" cy="130" r="2" fill="url(#joyGradient)" />
  </g>

  <!-- "Joy" written in code style (optional / subtle) -->
  <text x="100" y="195" text-anchor="middle" font-family="monospace" font-size="12" fill="url(#joyGradient)" opacity="0.8">&lt;joy /&gt;</text>
</svg>
